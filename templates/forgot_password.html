{% extends "base.html" %}
{% block content %}
<section class="auth-section">
  <div class="auth-card">
    <div class="auth-logo">
      <img src="{{ url_for("static", filename="images/logo.jpg") }}" alt="Diversity Ventures">
      <span>DIVERSITY VENTURES</span>
    </div>
    <div class="auth-icon-badge"><i class="fa-solid fa-lock-open"></i></div>
    <h1 class="auth-title">{{ t("forgot_title") }}</h1>
    <p class="auth-sub">{{ t("forgot_subtitle") }}</p>
    <form method="POST" class="auth-form">
      <div class="form-group">
        <label>{{ t("email_address") }}</label>
        <input type="email" name="email" placeholder="Enter your registered email" required>
      </div>
      <button type="submit" class="btn gold auth-btn">
        <i class="fa-solid fa-paper-plane"></i> {{ t("send_reset_code") }}
      </button>
    </form>
    <div class="auth-switch">
      Remember your password? <a href="{{ url_for("login") }}" class="inline-link">{{ t("login") }}</a>
    </div>
  </div>
</section>
{% endblock %}
