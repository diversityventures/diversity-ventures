{% extends 'base.html' %}

{% block content %}
<section class="auth-section">
  <div class="auth-card">

    <div class="auth-logo">
      <img src="{{ url_for('static', filename='images/logo.jpg') }}" alt="Diversity Ventures">
      <span>DIVERSITY VENTURES</span>
    </div>

    <h1 class="auth-title">{{ t('register_title') }}</h1>
    <p class="auth-sub">{{ t('register_subtitle') }}</p>

    <form method="POST" class="auth-form">
      <div class="form-group">
        <label>{{ t('full_name') }}</label>
        <input type="text" name="full_name" placeholder="Enter your full name" required>
      </div>

      <div class="form-group">
        <label>{{ t('email_address') }}</label>
        <input type="email" name="email" placeholder="Enter your email" required>
      </div>

      <div class="form-group">
        <label>{{ t('password') }}</label>
        <div class="password-input-wrap">
          <input type="password" name="password" id="register-password" placeholder="Create a strong password" required onkeyup="checkPasswordStrength()">
          <button type="button" class="eye-btn" onclick="togglePassword('register-password', this)">👁</button>
        </div>
      </div>

      <div class="password-rules">
        <div id="rule-length">✗ At least 8 characters</div>
        <div id="rule-upper">✗ At least 1 uppercase letter</div>
        <div id="rule-lower">✗ At least 1 lowercase letter</div>
        <div id="rule-number">✗ At least 1 number</div>
      </div>

      <button type="submit" class="btn gold auth-btn" id="register-btn" disabled>
        <i class="fa-solid fa-user-plus"></i> {{ t('create_account') }}
      </button>
    </form>

    <div class="auth-switch">
      Already have an account?
      <a href="{{ url_for('login') }}" class="inline-link">{{ t('login') }}</a>
    </div>

  </div>
</section>
{% endblock %}
