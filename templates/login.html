{% extends 'base.html' %}

{% block content %}
<section class="auth-section">
  <div class="auth-card">

    <div class="auth-logo">
      <img src="{{ url_for('static', filename='images/logo.jpg') }}" alt="Diversity Ventures">
      <span>DIVERSITY VENTURES</span>
    </div>

    <h1 class="auth-title">{{ t('login_title') }}</h1>
    <p class="auth-sub">{{ t('login_subtitle') }}</p>

    <form method="POST" class="auth-form">
      <div class="form-group">
        <label>{{ t('email_address') }}</label>
        <input type="email" name="email" placeholder="Enter your email" required>
      </div>

      <div class="form-group">
        <label>{{ t('password') }}</label>
        <div class="password-input-wrap">
          <input type="password" name="password" id="login-password" placeholder="Enter your password" required>
          <button type="button" class="eye-btn" onclick="togglePassword('login-password', this)">👁</button>
        </div>
      </div>

      <div class="auth-forgot">
        <a href="{{ url_for('forgot_password') }}" class="inline-link">{{ t('forgot_password') }}</a>
      </div>

      <button type="submit" class="btn gold auth-btn">
        <i class="fa-solid fa-right-to-bracket"></i> {{ t('login') }}
      </button>
    </form>

    <div class="auth-switch">
      Don't have an account?
      <a href="{{ url_for('register') }}" class="inline-link">{{ t('register') }}</a>
    </div>

  </div>
</section>
{% endblock %}
