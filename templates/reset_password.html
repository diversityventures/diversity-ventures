{% extends "base.html" %}
{% block content %}
<section class="auth-section">
  <div class="auth-card">
    <div class="auth-logo">
      <img src="{{ url_for("static", filename="images/logo.jpg") }}" alt="Diversity Ventures">
      <span>DIVERSITY VENTURES</span>
    </div>
    <div class="auth-icon-badge"><i class="fa-solid fa-key"></i></div>
    <h1 class="auth-title">{{ t("reset_title") }}</h1>
    <p class="auth-sub">{{ t("reset_subtitle") }}</p>
    <form method="POST" class="auth-form">
      <input type="hidden" name="email" value="{{ email }}">
      <div class="form-group">
        <label>{{ t("reset_code") }}</label>
        <input type="text" name="code" placeholder="Enter 6-digit reset code" required>
      </div>
      <div class="form-group">
        <label>{{ t("new_password") }}</label>
        <div class="password-input-wrap">
          <input type="password" name="new_password" id="reset-password" placeholder="Create new password" required onkeyup="checkResetPasswordStrength()">
          <button type="button" class="eye-btn" onclick="togglePassword("reset-password", this)">&#128065;</button>
        </div>
      </div>
      <div class="password-rules">
        <div id="reset-rule-length">&#x2717; At least 8 characters</div>
        <div id="reset-rule-upper">&#x2717; At least 1 uppercase letter</div>
        <div id="reset-rule-lower">&#x2717; At least 1 lowercase letter</div>
        <div id="reset-rule-number">&#x2717; At least 1 number</div>
      </div>
      <button type="submit" class="btn gold auth-btn" id="reset-btn" disabled>
        <i class="fa-solid fa-shield-check"></i> {{ t("reset_password") }}
      </button>
    </form>
    <div class="resend-wrap">
      <a href="{{ url_for("resend_reset", email=email) }}" id="resend-reset-link" class="inline-link disabled-link">{{ t("resend_code") }}</a>
      <p id="resend-reset-timer" class="cooldown-text"></p>
    </div>
  </div>
</section>
<script>document.addEventListener("DOMContentLoaded", function () { startCooldown("resend-reset-link", "resend-reset-timer", 60); });</script>
{% endblock %}
