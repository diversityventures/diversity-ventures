{% extends 'base.html' %}

{% block content %}
<section class="auth-section">
  <div class="auth-card">

    <div class="auth-logo">
      <img src="{{ url_for('static', filename='images/logo.jpg') }}" alt="Diversity Ventures">
      <span>DIVERSITY VENTURES</span>
    </div>

    <div class="auth-icon-badge">
      <i class="fa-solid fa-envelope-circle-check"></i>
    </div>

    <h1 class="auth-title">{{ t('verify_title') }}</h1>
    <p class="auth-sub">{{ t('verify_subtitle') }}</p>
    <p class="auth-email-hint">Code sent to: <strong>{{ email }}</strong></p>

    <form method="POST" id="verify-form" class="auth-form">
      <input type="hidden" name="email" value="{{ email }}">
      <input type="hidden" name="code" id="full-code">

      <div class="code-inputs">
        <input type="text" maxlength="1" class="code-box">
        <input type="text" maxlength="1" class="code-box">
        <input type="text" maxlength="1" class="code-box">
        <input type="text" maxlength="1" class="code-box">
        <input type="text" maxlength="1" class="code-box">
        <input type="text" maxlength="1" class="code-box">
      </div>

      <button type="submit" class="btn gold auth-btn">
        <i class="fa-solid fa-circle-check"></i> {{ t('verify_email') }}
      </button>
    </form>

    <div class="resend-wrap">
      <a href="{{ url_for('resend_verification', email=email) }}" id="resend-link" class="inline-link disabled-link">
        {{ t('resend_code') }}
      </a>
      <p id="timer" class="cooldown-text"></p>
    </div>

  </div>
</section>

<script>
const inputs = document.querySelectorAll(".code-box");
const fullCode = document.getElementById("full-code");

inputs.forEach((input, index) => {
  input.addEventListener("input", () => {
    input.value = input.value.replace(/[^0-9]/g, "");
    if (input.value && index < inputs.length - 1) inputs[index + 1].focus();
    updateCode();
  });
  input.addEventListener("keydown", (e) => {
    if (e.key === "Backspace" && !input.value && index > 0) inputs[index - 1].focus();
  });
});

document.addEventListener("paste", (e) => {
  const paste = e.clipboardData.getData("text").slice(0, 6);
  if (!/^\d+$/.test(paste)) return;
  inputs.forEach((input, i) => { input.value = paste[i] || ""; });
  updateCode();
});

function updateCode() {
  fullCode.value = Array.from(inputs).map(i => i.value).join("");
}

document.addEventListener("DOMContentLoaded", function () {
  startCooldown("resend-link", "timer", 60);
});
</script>
{% endblock %}
